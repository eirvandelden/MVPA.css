# Local lefthook configuration for mvpa.css gem
# Extends the global lefthook.yml from dotfiles

pre-commit:
  commands:
    rubocop:
      skip: true
    eslint:
      skip: true
    stylelint:
      skip: false
    browserslist:
      skip: false

pre-push:
  skip:
    - bundle-audit
    - brakeman
    - minitest
    - rspec
  commands:
    stylelint:
      skip: false
    browserslist:
      skip: false
